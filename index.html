<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="منصة البندري العتيبي التعليمية - الصف السادس الابتدائي" />
  <meta name="theme-color" content="#D63384" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="البندري التعليمية" />
  <title>منصة البندري العتيبي التعليمية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;600;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>" />
<style>
/* ===== منصة البندري العتيبي التعليمية ===== */
/* Arabic Educational Platform - Premium Design */

/* ===== CSS Variables ===== */
:root {
–gold: #D63384;
–gold-light: #F06FAD;
–gold-dark: #A0205F;
–emerald: #9B59B6;
–emerald-light: #B97DD4;
–emerald-dark: #6C3483;
–navy: #5B2C6F;
–navy-light: #8E44AD;
–cream: #FDF0F8;
–cream-dark: #F8DFF0;
–white: #FFFFFF;
–text-dark: #2C1A2E;
–text-mid: #6A3A6A;
–text-light: #B07AAA;
–shadow-sm: 0 2px 8px rgba(214,51,132,0.08);
–shadow-md: 0 8px 32px rgba(214,51,132,0.14);
–shadow-lg: 0 20px 60px rgba(155,89,182,0.18);
–shadow-gold: 0 4px 20px rgba(214,51,132,0.3);
–border-radius: 16px;
–border-radius-sm: 8px;
–border-radius-lg: 24px;
–transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
–font-arabic: ‘Cairo’, ‘Amiri’, serif;
–font-quran: ‘Amiri’, ‘Scheherazade New’, serif;
}

/* Dark Mode */
[data-theme=“dark”] {
–cream: #0D1117;
–cream-dark: #161B22;
–white: #1F2937;
–text-dark: #E5E7EB;
–text-mid: #9CA3AF;
–text-light: #6B7280;
–shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
–shadow-md: 0 8px 32px rgba(0,0,0,0.4);
}

/* ===== Reset & Base ===== */
*, *::before, *::after {
box-sizing: border-box;
margin: 0;
padding: 0;
}

html {
direction: rtl;
scroll-behavior: smooth;
}

body {
font-family: var(–font-arabic);
background: var(–cream);
color: var(–text-dark);
line-height: 1.8;
font-size: 16px;
overflow-x: hidden;
transition: background 0.3s, color 0.3s;
}

/* ===== Skeleton Loading ===== */
.skeleton {
background: linear-gradient(90deg, var(–cream-dark) 25%, var(–cream) 50%, var(–cream-dark) 75%);
background-size: 200% 100%;
animation: skeleton-shimmer 1.5s infinite;
border-radius: var(–border-radius-sm);
}

@keyframes skeleton-shimmer {
0% { background-position: 200% 0; }
100% { background-position: -200% 0; }
}

/* ===== Navigation ===== */
.navbar {
position: fixed;
top: 0;
right: 0;
left: 0;
z-index: 1000;
background: rgba(255,255,255,0.95);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border-bottom: 1px solid rgba(201,168,76,0.2);
padding: 0 24px;
height: 70px;
display: flex;
align-items: center;
justify-content: space-between;
box-shadow: var(–shadow-sm);
transition: var(–transition);
}

[data-theme=“dark”] .navbar {
background: rgba(13,17,23,0.95);
}

.navbar-brand {
display: flex;
align-items: center;
gap: 12px;
text-decoration: none;
}

.navbar-logo {
width: 44px;
height: 44px;
background: linear-gradient(135deg, var(–emerald), var(–emerald-light));
border-radius: 12px;
display: flex;
align-items: center;
justify-content: center;
font-size: 22px;
box-shadow: 0 4px 12px rgba(27,107,58,0.4);
}

.navbar-title {
font-family: var(–font-arabic);
font-size: 18px;
font-weight: 700;
color: var(–emerald-dark);
line-height: 1.2;
}

.navbar-subtitle {
font-size: 12px;
color: var(–gold-dark);
font-weight: 400;
}

.navbar-actions {
display: flex;
align-items: center;
gap: 12px;
}

.btn-icon {
width: 40px;
height: 40px;
border: none;
background: var(–cream-dark);
border-radius: 10px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
transition: var(–transition);
color: var(–text-mid);
}

.btn-icon:hover {
background: var(–emerald);
color: white;
transform: translateY(-1px);
}

/* ===== Main Layout ===== */
.layout {
display: flex;
min-height: 100vh;
padding-top: 70px;
}

.sidebar {
width: 280px;
min-height: calc(100vh - 70px);
background: var(–white);
border-left: 1px solid rgba(201,168,76,0.15);
position: fixed;
right: 0;
top: 70px;
bottom: 0;
overflow-y: auto;
z-index: 100;
padding: 20px 0;
transition: transform 0.3s ease;
box-shadow: -2px 0 20px rgba(0,0,0,0.05);
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(–gold-light); border-radius: 4px; }

.main-content {
flex: 1;
margin-right: 280px;
padding: 32px;
max-width: calc(100vw - 280px);
min-height: calc(100vh - 70px);
}

/* ===== Hero Section ===== */
.hero {
background: linear-gradient(135deg, var(–navy) 0%, var(–emerald-dark) 50%, var(–navy-light) 100%);
border-radius: var(–border-radius-lg);
padding: 60px 48px;
color: white;
position: relative;
overflow: hidden;
margin-bottom: 40px;
}

.hero::before {
content: ‘’;
position: absolute;
top: -50%;
left: -20%;
width: 400px;
height: 400px;
background: radial-gradient(circle, rgba(201,168,76,0.15) 0%, transparent 70%);
pointer-events: none;
}

.hero::after {
content: ‘🕌’;
position: absolute;
left: 40px;
top: 50%;
transform: translateY(-50%);
font-size: 80px;
opacity: 0.15;
}

.hero-title {
font-family: var(–font-quran);
font-size: clamp(28px, 4vw, 48px);
font-weight: 700;
color: var(–gold-light);
margin-bottom: 12px;
line-height: 1.3;
}

.hero-subtitle {
font-size: 18px;
opacity: 0.85;
margin-bottom: 32px;
}

.hero-stats {
display: flex;
gap: 32px;
flex-wrap: wrap;
}

.stat-item {
text-align: center;
}

.stat-number {
font-size: 32px;
font-weight: 900;
color: var(–gold-light);
display: block;
line-height: 1;
}

.stat-label {
font-size: 13px;
opacity: 0.8;
margin-top: 4px;
}

/* ===== Progress Bar ===== */
.progress-section {
background: var(–white);
border-radius: var(–border-radius);
padding: 24px;
margin-bottom: 32px;
box-shadow: var(–shadow-sm);
border: 1px solid rgba(201,168,76,0.1);
}

.progress-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 12px;
}

.progress-title {
font-weight: 600;
color: var(–text-dark);
}

.progress-percent {
font-size: 24px;
font-weight: 700;
color: var(–emerald);
}

.progress-bar-wrapper {
background: var(–cream-dark);
border-radius: 50px;
height: 12px;
overflow: hidden;
}

.progress-bar-fill {
height: 100%;
background: linear-gradient(90deg, var(–emerald-dark), var(–emerald-light));
border-radius: 50px;
transition: width 1s ease;
position: relative;
}

.progress-bar-fill::after {
content: ‘’;
position: absolute;
top: 0; bottom: 0; left: 0; right: 0;
background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
animation: shimmer 2s infinite;
}

@keyframes shimmer {
0% { transform: translateX(100%); }
100% { transform: translateX(-100%); }
}

/* ===== Book Cards ===== */
.section-title {
font-size: 22px;
font-weight: 700;
color: var(–text-dark);
margin-bottom: 24px;
display: flex;
align-items: center;
gap: 10px;
}

.section-title::before {
content: ‘’;
width: 4px;
height: 28px;
background: linear-gradient(180deg, var(–gold), var(–emerald));
border-radius: 4px;
display: inline-block;
}

.books-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
gap: 24px;
margin-bottom: 48px;
}

.book-card {
background: var(–white);
border-radius: var(–border-radius);
overflow: hidden;
box-shadow: var(–shadow-sm);
border: 1px solid rgba(201,168,76,0.1);
cursor: pointer;
transition: var(–transition);
position: relative;
}

.book-card:hover {
transform: translateY(-4px);
box-shadow: var(–shadow-md);
border-color: var(–gold-light);
}

.book-card-header {
padding: 28px 24px 20px;
color: white;
position: relative;
overflow: hidden;
}

.book-card-header::after {
content: ‘’;
position: absolute;
bottom: -30px;
left: -10px;
right: -10px;
height: 60px;
background: var(–white);
border-radius: 50%;
}

.book-icon {
font-size: 48px;
display: block;
margin-bottom: 12px;
filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
}

.book-title {
font-size: 20px;
font-weight: 700;
margin-bottom: 4px;
font-family: var(–font-arabic);
}

.book-subtitle {
font-size: 13px;
opacity: 0.85;
}

.book-card-body {
padding: 24px;
}

.book-meta {
display: flex;
gap: 16px;
margin-bottom: 20px;
}

.meta-tag {
background: var(–cream-dark);
padding: 4px 12px;
border-radius: 50px;
font-size: 13px;
color: var(–text-mid);
font-weight: 500;
}

.book-progress {
margin-bottom: 20px;
}

.book-progress-label {
display: flex;
justify-content: space-between;
font-size: 13px;
color: var(–text-mid);
margin-bottom: 6px;
}

.book-progress-bar {
background: var(–cream-dark);
border-radius: 50px;
height: 8px;
overflow: hidden;
}

.book-progress-fill {
height: 100%;
border-radius: 50px;
transition: width 0.8s ease;
}

.btn-primary {
width: 100%;
padding: 12px 24px;
border: none;
border-radius: var(–border-radius-sm);
background: linear-gradient(135deg, var(–emerald), var(–emerald-light));
color: white;
font-size: 15px;
font-weight: 600;
cursor: pointer;
font-family: var(–font-arabic);
transition: var(–transition);
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
}

.btn-primary:hover {
transform: translateY(-1px);
box-shadow: 0 4px 16px rgba(27,107,58,0.4);
}

/* ===== Sidebar Navigation ===== */
.sidebar-search {
padding: 0 16px 16px;
}

.search-input {
width: 100%;
padding: 10px 16px;
border: 1px solid rgba(201,168,76,0.25);
border-radius: var(–border-radius-sm);
background: var(–cream);
font-family: var(–font-arabic);
font-size: 14px;
color: var(–text-dark);
outline: none;
transition: var(–transition);
direction: rtl;
}

.search-input:focus {
border-color: var(–emerald);
box-shadow: 0 0 0 3px rgba(27,107,58,0.1);
}

.sidebar-section {
margin-bottom: 8px;
}

.sidebar-book-header {
display: flex;
align-items: center;
gap: 10px;
padding: 12px 16px;
cursor: pointer;
transition: var(–transition);
font-weight: 700;
font-size: 14px;
color: var(–text-dark);
border-right: 3px solid transparent;
}

.sidebar-book-header:hover {
background: var(–cream);
border-right-color: var(–gold);
}

.sidebar-book-header.active {
background: linear-gradient(90deg, var(–cream), var(–cream-dark));
border-right-color: var(–emerald);
color: var(–emerald-dark);
}

.sidebar-book-icon {
font-size: 20px;
width: 32px;
text-align: center;
}

.sidebar-book-content {
display: none;
padding: 4px 0 8px;
}

.sidebar-book-content.expanded {
display: block;
}

.sidebar-chapter {
padding: 6px 16px 6px 40px;
font-size: 13px;
color: var(–text-mid);
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.5px;
}

.sidebar-lesson {
display: flex;
align-items: center;
gap: 8px;
padding: 8px 16px 8px 44px;
font-size: 13px;
color: var(–text-mid);
cursor: pointer;
transition: var(–transition);
border-right: 3px solid transparent;
line-height: 1.4;
}

.sidebar-lesson:hover {
background: var(–cream);
color: var(–text-dark);
border-right-color: var(–gold-light);
}

.sidebar-lesson.active {
color: var(–emerald);
font-weight: 600;
border-right-color: var(–emerald);
background: rgba(27,107,58,0.05);
}

.lesson-number-badge {
min-width: 22px;
height: 22px;
background: var(–cream-dark);
border-radius: 50%;
font-size: 11px;
display: flex;
align-items: center;
justify-content: center;
font-weight: 700;
flex-shrink: 0;
}

.sidebar-lesson.active .lesson-number-badge {
background: var(–emerald);
color: white;
}

/* ===== Lesson Page ===== */
.lesson-page {
display: none;
animation: fadeInUp 0.4s ease;
}

.lesson-page.active {
display: block;
}

@keyframes fadeInUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

.lesson-header {
background: linear-gradient(135deg, var(–navy), var(–navy-light));
border-radius: var(–border-radius);
padding: 32px 36px;
color: white;
margin-bottom: 28px;
position: relative;
overflow: hidden;
}

.lesson-header::before {
content: ‘’;
position: absolute;
top: 0; right: 0; bottom: 0;
width: 4px;
background: linear-gradient(180deg, var(–gold), var(–gold-dark));
}

.lesson-number-tag {
background: rgba(201,168,76,0.2);
border: 1px solid var(–gold);
color: var(–gold-light);
padding: 4px 14px;
border-radius: 50px;
font-size: 13px;
font-weight: 600;
display: inline-block;
margin-bottom: 12px;
}

.lesson-title {
font-size: clamp(22px, 3vw, 32px);
font-weight: 700;
font-family: var(–font-arabic);
margin-bottom: 8px;
color: var(–gold-light);
}

.lesson-book {
font-size: 14px;
opacity: 0.75;
}

.lesson-nav-bar {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 28px;
gap: 12px;
}

.lesson-nav-btn {
display: flex;
align-items: center;
gap: 8px;
padding: 10px 20px;
border: 1px solid rgba(201,168,76,0.3);
border-radius: var(–border-radius-sm);
background: var(–white);
color: var(–text-mid);
font-family: var(–font-arabic);
font-size: 14px;
cursor: pointer;
transition: var(–transition);
}

.lesson-nav-btn:hover {
border-color: var(–emerald);
color: var(–emerald);
background: rgba(27,107,58,0.05);
}

/* ===== Lesson Content Cards ===== */
.lesson-grid {
display: grid;
grid-template-columns: 1fr;
gap: 24px;
}

.content-card {
background: var(–white);
border-radius: var(–border-radius);
box-shadow: var(–shadow-sm);
border: 1px solid rgba(201,168,76,0.1);
overflow: hidden;
transition: var(–transition);
}

.content-card:hover {
box-shadow: var(–shadow-md);
}

.card-header {
padding: 18px 24px;
display: flex;
align-items: center;
gap: 12px;
border-bottom: 1px solid rgba(201,168,76,0.1);
}

.card-icon {
width: 40px;
height: 40px;
border-radius: 10px;
display: flex;
align-items: center;
justify-content: center;
font-size: 20px;
flex-shrink: 0;
}

.card-icon.green { background: rgba(27,107,58,0.1); }
.card-icon.gold { background: rgba(201,168,76,0.1); }
.card-icon.blue { background: rgba(13,43,69,0.1); }
.card-icon.purple { background: rgba(106,27,154,0.1); }

.card-title {
font-size: 16px;
font-weight: 700;
color: var(–text-dark);
}

.card-body {
padding: 24px;
}

/* Objectives */
.objectives-list {
list-style: none;
}

.objectives-list li {
display: flex;
align-items: flex-start;
gap: 10px;
padding: 10px 0;
border-bottom: 1px solid var(–cream-dark);
font-size: 15px;
line-height: 1.6;
}

.objectives-list li:last-child {
border-bottom: none;
}

.objectives-list li::before {
content: ‘✓’;
min-width: 24px;
height: 24px;
background: linear-gradient(135deg, var(–emerald), var(–emerald-light));
color: white;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 12px;
font-weight: 700;
margin-top: 2px;
flex-shrink: 0;
}

/* Content */
.lesson-content-text {
font-size: 16px;
line-height: 2;
color: var(–text-dark);
white-space: pre-wrap;
}

/* Examples */
.examples-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
gap: 12px;
}

.example-item {
background: linear-gradient(135deg, var(–cream), var(–cream-dark));
border: 1px solid rgba(201,168,76,0.2);
border-radius: var(–border-radius-sm);
padding: 14px 16px;
font-family: var(–font-quran);
font-size: 18px;
color: var(–emerald-dark);
text-align: center;
transition: var(–transition);
}

.example-item:hover {
border-color: var(–gold);
transform: translateY(-2px);
box-shadow: var(–shadow-gold);
}

/* Summary */
.summary-box {
background: linear-gradient(135deg, rgba(27,107,58,0.08), rgba(201,168,76,0.08));
border: 1px solid rgba(27,107,58,0.2);
border-radius: var(–border-radius-sm);
padding: 20px;
font-size: 16px;
line-height: 1.8;
color: var(–emerald-dark);
font-weight: 500;
}

/* ===== Quiz ===== */
.quiz-container {
max-width: 100%;
}

.quiz-question {
background: var(–white);
border-radius: var(–border-radius);
padding: 24px;
margin-bottom: 20px;
border: 1px solid rgba(201,168,76,0.15);
box-shadow: var(–shadow-sm);
}

.quiz-q-number {
font-size: 12px;
color: var(–gold-dark);
font-weight: 700;
text-transform: uppercase;
margin-bottom: 8px;
}

.quiz-q-text {
font-size: 17px;
font-weight: 600;
color: var(–text-dark);
margin-bottom: 20px;
line-height: 1.6;
}

.quiz-choices {
display: grid;
gap: 10px;
}

.quiz-choice {
padding: 12px 20px;
border: 1.5px solid var(–cream-dark);
border-radius: var(–border-radius-sm);
cursor: pointer;
font-family: var(–font-arabic);
font-size: 15px;
background: var(–cream);
color: var(–text-dark);
transition: var(–transition);
text-align: right;
position: relative;
overflow: hidden;
}

.quiz-choice:hover {
border-color: var(–emerald-light);
background: rgba(27,107,58,0.05);
}

.quiz-choice.correct {
border-color: var(–emerald);
background: rgba(27,107,58,0.1);
color: var(–emerald-dark);
font-weight: 600;
}

.quiz-choice.correct::before {
content: ‘✓’;
position: absolute;
left: 16px;
top: 50%;
transform: translateY(-50%);
color: var(–emerald);
font-weight: 700;
}

.quiz-choice.wrong {
border-color: #DC2626;
background: rgba(220,38,38,0.08);
color: #DC2626;
}

.quiz-choice.wrong::before {
content: ‘✗’;
position: absolute;
left: 16px;
top: 50%;
transform: translateY(-50%);
color: #DC2626;
}

.quiz-choice:disabled {
cursor: not-allowed;
opacity: 0.7;
}

.quiz-result {
text-align: center;
padding: 32px;
background: linear-gradient(135deg, var(–navy), var(–emerald-dark));
border-radius: var(–border-radius);
color: white;
margin-top: 24px;
display: none;
}

.quiz-result.show {
display: block;
animation: fadeInUp 0.4s ease;
}

.quiz-score {
font-size: 60px;
font-weight: 900;
color: var(–gold-light);
line-height: 1;
margin-bottom: 8px;
}

.quiz-feedback {
font-size: 20px;
margin-bottom: 20px;
}

.btn-retry {
background: rgba(255,255,255,0.15);
border: 1px solid rgba(255,255,255,0.3);
color: white;
padding: 10px 28px;
border-radius: var(–border-radius-sm);
cursor: pointer;
font-family: var(–font-arabic);
font-size: 15px;
transition: var(–transition);
}

.btn-retry:hover {
background: rgba(255,255,255,0.25);
}

/* ===== Dashboard ===== */
.dashboard-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
gap: 20px;
margin-bottom: 32px;
}

.dash-stat {
background: var(–white);
border-radius: var(–border-radius);
padding: 24px;
box-shadow: var(–shadow-sm);
border: 1px solid rgba(201,168,76,0.1);
text-align: center;
transition: var(–transition);
}

.dash-stat:hover {
transform: translateY(-2px);
box-shadow: var(–shadow-md);
}

.dash-stat-icon {
font-size: 36px;
margin-bottom: 12px;
}

.dash-stat-value {
font-size: 36px;
font-weight: 900;
color: var(–emerald);
line-height: 1;
margin-bottom: 4px;
}

.dash-stat-label {
font-size: 14px;
color: var(–text-mid);
}

/* ===== Search Results ===== */
.search-results {
position: absolute;
top: calc(100% + 8px);
right: 0; left: 0;
background: var(–white);
border-radius: var(–border-radius-sm);
box-shadow: var(–shadow-md);
border: 1px solid rgba(201,168,76,0.2);
max-height: 300px;
overflow-y: auto;
z-index: 1000;
display: none;
}

.search-results.show {
display: block;
}

.search-result-item {
padding: 12px 16px;
cursor: pointer;
transition: var(–transition);
border-bottom: 1px solid var(–cream-dark);
}

.search-result-item:last-child {
border-bottom: none;
}

.search-result-item:hover {
background: var(–cream);
}

.search-result-title {
font-weight: 600;
font-size: 14px;
color: var(–text-dark);
}

.search-result-book {
font-size: 12px;
color: var(–text-light);
margin-top: 2px;
}

/* ===== Flashcards ===== */
.flashcard-container {
perspective: 1000px;
margin-bottom: 20px;
}

.flashcard {
width: 100%;
min-height: 200px;
position: relative;
transform-style: preserve-3d;
transition: transform 0.6s;
cursor: pointer;
}

.flashcard.flipped {
transform: rotateY(180deg);
}

.flashcard-front, .flashcard-back {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
backface-visibility: hidden;
border-radius: var(–border-radius);
display: flex;
align-items: center;
justify-content: center;
text-align: center;
padding: 32px;
}

.flashcard-front {
background: linear-gradient(135deg, var(–navy), var(–emerald-dark));
color: white;
}

.flashcard-back {
background: linear-gradient(135deg, var(–emerald), var(–emerald-light));
color: white;
transform: rotateY(180deg);
}

.flashcard-text {
font-size: 22px;
font-weight: 700;
font-family: var(–font-arabic);
line-height: 1.6;
}

.flashcard-hint {
font-size: 12px;
opacity: 0.7;
margin-top: 16px;
}

/* ===== Video Section ===== */
.video-placeholder {
background: linear-gradient(135deg, #1a1a2e, #16213e);
border-radius: var(–border-radius);
aspect-ratio: 16/9;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
color: white;
cursor: pointer;
transition: var(–transition);
position: relative;
overflow: hidden;
}

.video-placeholder:hover .play-btn {
transform: scale(1.1);
}

.play-btn {
width: 70px;
height: 70px;
background: rgba(201,168,76,0.9);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 24px;
margin-bottom: 16px;
transition: var(–transition);
box-shadow: var(–shadow-gold);
}

.video-title-text {
font-size: 16px;
opacity: 0.8;
}

/* ===== Toast Notification ===== */
.toast {
position: fixed;
bottom: 32px;
left: 50%;
transform: translateX(-50%) translateY(100px);
background: var(–navy);
color: white;
padding: 14px 28px;
border-radius: 50px;
font-size: 14px;
font-weight: 500;
z-index: 9999;
transition: transform 0.3s ease;
box-shadow: var(–shadow-md);
border: 1px solid rgba(201,168,76,0.3);
}

.toast.show {
transform: translateX(-50%) translateY(0);
}

/* ===== Responsive ===== */
@media (max-width: 1024px) {
.sidebar {
transform: translateX(280px);
}
.sidebar.open {
transform: translateX(0);
}
.main-content {
margin-right: 0;
max-width: 100vw;
padding: 20px 16px;
}
.hero { padding: 40px 24px; }
}

@media (max-width: 640px) {
.books-grid { grid-template-columns: 1fr; }
.hero-stats { gap: 16px; }
.lesson-header { padding: 24px 20px; }
.card-body { padding: 16px; }
.examples-grid { grid-template-columns: 1fr 1fr; }
}

/* ===== Overlay for mobile sidebar ===== */
.sidebar-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.4);
z-index: 99;
}

.sidebar-overlay.show {
display: block;
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.4); border-radius: 6px; }
::-webkit-scrollbar-thumb:hover { background: var(–gold); }

/* ===== PWA Install Banner ===== */
.pwa-banner {
position: fixed;
bottom: 20px;
right: 20px;
background: var(–white);
border: 1px solid rgba(201,168,76,0.3);
border-radius: var(–border-radius);
padding: 16px 20px;
box-shadow: var(–shadow-md);
z-index: 500;
display: flex;
align-items: center;
gap: 12px;
font-size: 14px;
display: none;
}

/* ===== Animations ===== */
@keyframes pulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.5; }
}

.pulse { animation: pulse 2s infinite; }

.stagger-child {
opacity: 0;
transform: translateY(20px);
animation: fadeInUp 0.5s ease forwards;
}

.stagger-child:nth-child(1) { animation-delay: 0.1s; }
.stagger-child:nth-child(2) { animation-delay: 0.2s; }
.stagger-child:nth-child(3) { animation-delay: 0.3s; }
.stagger-child:nth-child(4) { animation-delay: 0.4s; }
.stagger-child:nth-child(5) { animation-delay: 0.5s; }
</style>

// ===== منصة البندري العتيبي التعليمية - Main App =====

const App = {
  state: {
    currentBook: null,
    currentLesson: null,
    progress: {},
    darkMode: false,
    quizAnswers: {},
    view: 'home', // home | lesson | dashboard
  },

  init() {
    this.loadProgress();
    this.loadTheme();
    this.renderSidebar();
    this.renderHome();
    this.bindGlobalEvents();
    this.registerSW();
    console.log('✅ منصة البندري العتيبي التعليمية جاهزة');
  },

  // ===== Progress Management =====
  loadProgress() {
    try {
      this.state.progress = JSON.parse(localStorage.getItem('albandari_progress') || '{}');
    } catch { this.state.progress = {}; }
  },

  saveProgress() {
    localStorage.setItem('albandari_progress', JSON.stringify(this.state.progress));
  },

  markLessonComplete(lessonId) {
    this.state.progress[lessonId] = { completed: true, date: new Date().toISOString() };
    this.saveProgress();
    this.updateProgressBar();
    this.showToast('تم إتمام الدرس! 🎉');
  },

  isCompleted(lessonId) {
    return !!this.state.progress[lessonId]?.completed;
  },

  getOverallProgress() {
    let total = 0, completed = 0;
    PLATFORM_DATA.books.forEach(book => {
      book.units.forEach(unit => {
        unit.chapters.forEach(chapter => {
          const lessons = chapter.lessons || (chapter.sections?.flatMap(s => s.lessons)) || [];
          total += lessons.length;
          lessons.forEach(l => { if (this.isCompleted(l.id)) completed++; });
        });
      });
    });
    return total ? Math.round((completed / total) * 100) : 0;
  },

  updateProgressBar() {
    const pct = this.getOverallProgress();
    const bar = document.getElementById('overall-progress-bar');
    const pctEl = document.getElementById('overall-progress-pct');
    if (bar) bar.style.width = pct + '%';
    if (pctEl) pctEl.textContent = pct + '%';
  },

  // ===== Theme =====
  loadTheme() {
    const saved = localStorage.getItem('albandari_theme');
    if (saved === 'dark') this.toggleDark(true);
  },

  toggleDark(force) {
    const isDark = force !== undefined ? force : !this.state.darkMode;
    this.state.darkMode = isDark;
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    localStorage.setItem('albandari_theme', isDark ? 'dark' : 'light');
    const btn = document.getElementById('theme-toggle');
    if (btn) btn.textContent = isDark ? '☀️' : '🌙';
  },

  // ===== Sidebar =====
  renderSidebar() {
    const sidebar = document.getElementById('sidebar');
    if (!sidebar) return;

    let html = `
      <div class="sidebar-search" style="position:relative">
        <input type="text" class="search-input" id="sidebar-search" placeholder="🔍 ابحث في المناهج..." oninput="App.search(this.value)" />
        <div class="search-results" id="search-results"></div>
      </div>
    `;

    PLATFORM_DATA.books.forEach(book => {
      const allLessons = this.getAllLessons(book);
      const completed = allLessons.filter(l => this.isCompleted(l.id)).length;

      html += `
        <div class="sidebar-section">
          <div class="sidebar-book-header" onclick="App.toggleSidebarBook('${book.id}')" id="sidebar-book-${book.id}">
            <span class="sidebar-book-icon">${book.icon}</span>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;line-height:1.3">${book.title}</div>
              <div style="font-size:11px;color:var(--text-light);font-weight:400">${completed}/${allLessons.length} درس</div>
            </div>
            <span id="arrow-${book.id}" style="font-size:12px;transition:transform 0.3s">▼</span>
          </div>
          <div class="sidebar-book-content" id="content-${book.id}">
      `;

      book.units.forEach(unit => {
        unit.chapters.forEach(chapter => {
          html += `<div class="sidebar-chapter">${chapter.title}</div>`;
          
          const lessons = chapter.lessons || [];
          lessons.forEach(lesson => {
            const done = this.isCompleted(lesson.id);
            html += `
              <div class="sidebar-lesson" id="nav-${lesson.id}" onclick="App.navigateToLesson('${book.id}', '${lesson.id}')">
                <span class="lesson-number-badge">${done ? '✓' : lesson.number}</span>
                <span style="flex:1">${lesson.title}</span>
              </div>
            `;
          });

          (chapter.sections || []).forEach(section => {
            html += `<div class="sidebar-chapter" style="padding-top:4px">${section.title.substring(0,40)}...</div>`;
            section.lessons.forEach(lesson => {
              const done = this.isCompleted(lesson.id);
              html += `
                <div class="sidebar-lesson" id="nav-${lesson.id}" onclick="App.navigateToLesson('${book.id}', '${lesson.id}')">
                  <span class="lesson-number-badge">${done ? '✓' : lesson.number}</span>
                  <span style="flex:1">${lesson.title}</span>
                </div>
              `;
            });
          });
        });
      });

      html += `</div></div>`;
    });

    sidebar.innerHTML = html;
  },

  toggleSidebarBook(bookId) {
    const content = document.getElementById(`content-${bookId}`);
    const arrow = document.getElementById(`arrow-${bookId}`);
    const header = document.getElementById(`sidebar-book-${bookId}`);
    const isExpanded = content.classList.contains('expanded');
    
    // Close all
    document.querySelectorAll('.sidebar-book-content').forEach(el => el.classList.remove('expanded'));
    document.querySelectorAll('[id^="arrow-"]').forEach(el => el.style.transform = '');
    document.querySelectorAll('.sidebar-book-header').forEach(el => el.classList.remove('active'));
    
    if (!isExpanded) {
      content.classList.add('expanded');
      if (arrow) arrow.style.transform = 'rotate(180deg)';
      if (header) header.classList.add('active');
    }
  },

  getAllLessons(book) {
    const lessons = [];
    book.units.forEach(unit => {
      unit.chapters.forEach(chapter => {
        (chapter.lessons || []).forEach(l => lessons.push({ ...l, bookId: book.id }));
        (chapter.sections || []).forEach(s => s.lessons.forEach(l => lessons.push({ ...l, bookId: book.id })));
      });
    });
    return lessons;
  },

  getAllLessonsFlat() {
    const lessons = [];
    PLATFORM_DATA.books.forEach(book => {
      this.getAllLessons(book).forEach(l => lessons.push({ ...l, bookId: book.id }));
    });
    return lessons;
  },

  findLesson(lessonId) {
    return this.getAllLessonsFlat().find(l => l.id === lessonId);
  },

  findBook(bookId) {
    return PLATFORM_DATA.books.find(b => b.id === bookId);
  },

  // ===== Navigation =====
  navigateToLesson(bookId, lessonId) {
    this.state.currentBook = bookId;
    this.state.currentLesson = lessonId;
    this.state.view = 'lesson';

    // Update sidebar active state
    document.querySelectorAll('.sidebar-lesson').forEach(el => el.classList.remove('active'));
    const navEl = document.getElementById(`nav-${lessonId}`);
    if (navEl) {
      navEl.classList.add('active');
      navEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Expand book
    const lesson = this.findLesson(lessonId);
    if (lesson) this.toggleSidebarBook(lesson.bookId);

    this.renderLesson(lessonId);
    window.scrollTo({ top: 0, behavior: 'smooth' });
    this.closeSidebarMobile();
  },

  navigateHome() {
    this.state.view = 'home';
    this.state.currentLesson = null;
    document.querySelectorAll('.sidebar-lesson').forEach(el => el.classList.remove('active'));
    this.renderHome();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  },

  openBook(bookId) {
    const book = this.findBook(bookId);
    if (!book) return;
    const lessons = this.getAllLessons(book);
    const firstIncomplete = lessons.find(l => !this.isCompleted(l.id));
    const target = firstIncomplete || lessons[0];
    if (target) {
      this.toggleSidebarBook(bookId);
      this.navigateToLesson(bookId, target.id);
    }
  },

            <div class="examples-grid">

  renderQuiz(lesson) {
    const quizId = `quiz-${lesson.id}`;
    let html = `
      <div class="content-card stagger-child">
        <div class="card-header">
          <div class="card-icon purple">🧠</div>
          <div class="card-title">اختبار الدرس</div>
        </div>
        <div class="card-body">
          <div class="quiz-container" id="${quizId}">
    `;

    lesson.quiz.forEach((q, qi) => {
      html += `
        <div class="quiz-question">
          <div class="quiz-q-number">السؤال ${qi + 1}</div>
          <div class="quiz-q-text">${q.q}</div>
          <div class="quiz-choices" id="${quizId}-q${qi}">
            ${q.choices.map((c, ci) => `
              <button class="quiz-choice" 
                      onclick="App.answerQuiz('${quizId}',${qi},'${c.replace(/'/g, "\\'")}','${q.a.replace(/'/g, "\\'")}',this)"
                      data-quiz="${quizId}" data-qi="${qi}">
                ${c}
              </button>
            `).join('')}
          </div>
        </div>
      `;
    });

    html += `
            <div id="${quizId}-result" class="quiz-result">
              <div class="quiz-score" id="${quizId}-score">0%</div>
              <div class="quiz-feedback" id="${quizId}-feedback">-</div>
              <button class="btn-retry" onclick="App.retryQuiz('${quizId}', '${lesson.id}')">🔄 إعادة الاختبار</button>
            </div>
          </div>
        </div>
      </div>
    `;

    this.state.quizAnswers[quizId] = { answers: {}, total: lesson.quiz.length };
    return html;
  },

  answerQuiz(quizId, qi, chosen, correct, btn) {
    // Disable all choices for this question
    const container = document.getElementById(`${quizId}-q${qi}`);
    container.querySelectorAll('.quiz-choice').forEach(b => {
      b.disabled = true;
      b.classList.add(b.textContent.trim() === correct ? 'correct' : '');
    });

    const isCorrect = chosen === correct;
    btn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) {
      // Show correct answer
      container.querySelectorAll('.quiz-choice').forEach(b => {
        if (b.textContent.trim() === correct) b.classList.add('correct');
      });
    }

    // Track answer
    if (!this.state.quizAnswers[quizId]) this.state.quizAnswers[quizId] = { answers: {}, total: 0 };
    this.state.quizAnswers[quizId].answers[qi] = isCorrect;

    // Check if all answered
    const qa = this.state.quizAnswers[quizId];
    if (Object.keys(qa.answers).length === qa.total) {
      setTimeout(() => this.showQuizResult(quizId), 500);
    }
  },

  showQuizResult(quizId) {
    const qa = this.state.quizAnswers[quizId];
    const correct = Object.values(qa.answers).filter(Boolean).length;
    const pct = Math.round((correct / qa.total) * 100);
    
    const result = document.getElementById(`${quizId}-result`);
    const score = document.getElementById(`${quizId}-score`);
    const feedback = document.getElementById(`${quizId}-feedback`);

    if (result) {
      score.textContent = `${pct}%`;
      feedback.textContent = pct === 100 ? '🌟 ممتاز! إجابات صحيحة بالكامل!' :
                              pct >= 70 ? '✅ جيد جداً! استمر في التعلم' :
                              pct >= 50 ? '📚 جيد، راجع الدرس وحاول مجدداً' :
                              '💪 راجع الدرس جيداً وأعد المحاولة';
      result.classList.add('show');
      result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  },

  retryQuiz(quizId, lessonId) {
    const lesson = this.findLesson(lessonId);
    if (lesson) {
      // Re-render just the quiz section
      const container = document.getElementById(quizId);
      if (!container) return;
      delete this.state.quizAnswers[quizId];
      this.state.quizAnswers[quizId] = { answers: {}, total: lesson.quiz.length };
      
      let html = '';
      lesson.quiz.forEach((q, qi) => {
        html += `
          <div class="quiz-question">
            <div class="quiz-q-number">السؤال ${qi + 1}</div>
            <div class="quiz-q-text">${q.q}</div>
            <div class="quiz-choices" id="${quizId}-q${qi}">
              ${q.choices.map(c => `
                <button class="quiz-choice"
                        onclick="App.answerQuiz('${quizId}',${qi},'${c.replace(/'/g, "\\'")}','${q.a.replace(/'/g, "\\'")}',this)">
                  ${c}
                </button>
              `).join('')}
            </div>
          </div>
        `;
      });
      html += `<div id="${quizId}-result" class="quiz-result">
        <div class="quiz-score" id="${quizId}-score">0%</div>
        <div class="quiz-feedback" id="${quizId}-feedback">-</div>
        <button class="btn-retry" onclick="App.retryQuiz('${quizId}','${lessonId}')">🔄 إعادة الاختبار</button>
      </div>`;
      container.innerHTML = html;
    }
  },

  // ===== Search =====
  search(query) {
    const results = document.getElementById('search-results');
    if (!results) return;

    if (!query.trim()) {
      results.classList.remove('show');
      return;
    }

    const q = query.toLowerCase();
    const matches = this.getAllLessonsFlat().filter(l =>
      l.title.toLowerCase().includes(q) ||
      l.content?.toLowerCase().includes(q) ||
      l.summary?.toLowerCase().includes(q)
    ).slice(0, 8);

    if (!matches.length) {
      results.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-light);font-size:13px">لا توجد نتائج</div>';
    } else {
      results.innerHTML = matches.map(l => {
        const book = this.findBook(l.bookId);
        return `
          <div class="search-result-item" onclick="App.navigateToLesson('${l.bookId}','${l.id}');document.getElementById('search-results').classList.remove('show')">
            <div class="search-result-title">${l.title}</div>
            <div class="search-result-book">${book?.icon} ${book?.title}</div>
          </div>
        `;
      }).join('');
    }
    results.classList.add('show');
  },

  // ===== Dashboard =====
  renderDashboard() {
    const allLessons = this.getAllLessonsFlat();
    const completed = allLessons.filter(l => this.isCompleted(l.id)).length;
    const progress = this.getOverallProgress();

    const main = document.getElementById('main-content');
    main.innerHTML = `
      <div style="margin-bottom:32px">
        <div class="section-title">📊 لوحة المتابعة</div>
      </div>

      <div class="dashboard-grid">
        <div class="dash-stat">
          <div class="dash-stat-icon">📚</div>
          <div class="dash-stat-value">${PLATFORM_DATA.books.length}</div>
          <div class="dash-stat-label">كتب دراسية</div>
        </div>
        <div class="dash-stat">
          <div class="dash-stat-icon">📖</div>
          <div class="dash-stat-value">${allLessons.length}</div>
          <div class="dash-stat-label">إجمالي الدروس</div>
        </div>
        <div class="dash-stat">
          <div class="dash-stat-icon">✅</div>
          <div class="dash-stat-value">${completed}</div>
          <div class="dash-stat-label">دروس مكتملة</div>
        </div>
        <div class="dash-stat">
          <div class="dash-stat-icon">📈</div>
          <div class="dash-stat-value">${progress}%</div>
          <div class="dash-stat-label">نسبة الإنجاز</div>
        </div>
      </div>

      <div class="section-title">📚 تفاصيل كل كتاب</div>
      <div style="display:grid;gap:16px;margin-bottom:40px">
        ${PLATFORM_DATA.books.map(book => {
          const lessons = this.getAllLessons(book);
          const done = lessons.filter(l => this.isCompleted(l.id)).length;
          const pct = lessons.length ? Math.round((done / lessons.length) * 100) : 0;
          return `
            <div style="background:var(--white);border-radius:16px;padding:20px 24px;border:1px solid rgba(201,168,76,0.15);box-shadow:var(--shadow-sm)">
              <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
                <span style="font-size:28px">${book.icon}</span>
                <div style="flex:1">
                  <div style="font-weight:700;color:var(--text-dark)">${book.title}</div>
                  <div style="font-size:13px;color:var(--text-light)">${done}/${lessons.length} درس</div>
                </div>
                <span style="font-size:20px;font-weight:700;color:${book.color}">${pct}%</span>
              </div>
              <div style="background:var(--cream-dark);border-radius:50px;height:8px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:${book.color};border-radius:50px;transition:width 1s ease"></div>
              </div>
            </div>
          `;
        }).join('')}
      </div>

      <div class="section-title">⚙️ الإعدادات</div>
      <div style="background:var(--white);border-radius:16px;padding:24px;border:1px solid rgba(201,168,76,0.15)">
        <button onclick="App.resetProgress()" 
                style="background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.3);color:#DC2626;
                       padding:10px 24px;border-radius:8px;cursor:pointer;font-family:var(--font-arabic);font-size:14px">
          🗑️ إعادة تعيين التقدم
        </button>
      </div>
    `;
    this.state.view = 'dashboard';
  },

  resetProgress() {
    if (confirm('هل أنت متأكد من إعادة تعيين كل التقدم؟ لا يمكن التراجع عن هذه الخطوة.')) {
      this.state.progress = {};
      this.saveProgress();
      this.renderSidebar();
      this.navigateHome();
      this.showToast('تم إعادة تعيين التقدم');
    }
  },

  // ===== Toast =====
  showToast(msg) {
    const toast = document.getElementById('toast');
    if (!toast) return;
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  },

  // ===== Mobile Sidebar =====
  toggleSidebarMobile() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    sidebar?.classList.toggle('open');
    overlay?.classList.toggle('show');
  },

  closeSidebarMobile() {
    if (window.innerWidth <= 1024) {
      document.getElementById('sidebar')?.classList.remove('open');
      document.getElementById('sidebar-overlay')?.classList.remove('show');
    }
  },

  // ===== Events =====
  bindGlobalEvents() {
    // Theme toggle
    document.getElementById('theme-toggle')?.addEventListener('click', () => this.toggleDark());

    // Menu toggle
    document.getElementById('menu-toggle')?.addEventListener('click', () => this.toggleSidebarMobile());

    // Overlay
    document.getElementById('sidebar-overlay')?.addEventListener('click', () => this.closeSidebarMobile());

    // Dashboard
    document.getElementById('dashboard-btn')?.addEventListener('click', () => this.renderDashboard());

    // Home
    document.getElementById('home-btn')?.addEventListener('click', () => this.navigateHome());

    // Close search on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.sidebar-search')) {
        document.getElementById('search-results')?.classList.remove('show');
      }
    });

    // Keyboard shortcut
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') this.closeSidebarMobile();
    });
  },

  // ===== PWA Service Worker =====
  registerSW() {
    if ('serviceWorker' in navigator) {
      
    }
  }
};

// Init on DOM ready
document.addEventListener('DOMContentLoaded', () => App.init());
window.addEventListener('load', () => { if (document.getElementById('main-content') && !document.getElementById('main-content').innerHTML.trim()) App.init(); });
</script>

</body>
</html>
